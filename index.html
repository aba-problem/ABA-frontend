<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En construcción</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111827;
            color: #f9fafb;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.3rem;
            color: #d1d5db;
            margin-bottom: 0.8rem;
        }

        .emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        small {
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚧</div>
        <h1>¡En construcción!</h1>
        <p>Estamos programando con café, errores de compilación y buenas intenciones.</p>
        <p>Vuelve más tarde... o pulsa <kbd>F5</kbd> compulsivamente, como hacemos nosotros.</p>
        <small>Si ves esta página, al menos el servidor funciona. 🎉</small>
    </div>
</body>
</html>
